<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m/m — Essential Modularity.</title>
    <meta name="description" content="A singular point of choice for the library." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --subtle: #404040;
            --accent: #00a4dc;
            --serif: 'Instrument Serif', serif;
            --mono: 'Geist Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--serif);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .canvas {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        nav {
            position: absolute;
            top: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .identity {
            font-size: 24px;
            text-decoration: none;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        header {
            max-width: 800px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: clamp(64px, 12vw, 180px);
            font-weight: 400;
            line-height: 0.85;
            letter-spacing: -0.05em;
        }

        h1 span {
            display: block;
            color: var(--subtle);
        }

        h1 em {
            font-style: italic;
        }

        .thought {
            font-size: clamp(18px, 2vw, 24px);
            color: var(--subtle);
            max-width: 460px;
            line-height: 1.3;
            margin: 0 auto;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .actions {
            margin-top: 80px;
        }

        .choice {
            font-size: 32px;
            color: var(--text);
            text-decoration: none;
            transition: opacity 0.3s ease;
            position: relative;
        }

        .choice:hover {
            opacity: 0.5;
        }

        .choice::after {
            content: "The singular source.";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--mono);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-top: 20px;
            color: var(--accent);
            white-space: nowrap;
        }

        footer {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--subtle);
            text-transform: uppercase;
        }

        footer a {
            color: inherit;
            text-decoration: none;
            margin: 0 15px;
        }

        footer a:hover { color: var(--text); }

        @media (max-width: 768px) {
            h1 { font-size: 80px; }
            .thought { padding: 0 20px; }
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="identity">m/m</a>
    </nav>

    <main class="canvas">
        <header>
            <h1>
                <span>Essential</span>
                <em>Modularity.</em>
            </h1>
        </header>

        <p class="thought">The art of the personal library. A singular way to refine the experience of your collection.</p>

        <section class="actions">
            <a href="https://github.com/Jellyfin-PG/Mod-Manager#installation" class="choice">Begin.</a>
        </section>
    </main>

    <footer>
        <a href="https://github.com/Jellyfin-PG/Mod-Manager">Source</a>
        <span>·</span>
        <span>©2026</span>
    </footer>
</body>

</html>
