<svg width="512" height="512" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="64" cy="64" r="64" fill="#1E1E2F"/>

  <!-- Stacked blocks (representing mods) -->
  <rect x="36" y="36" width="28" height="28" rx="6" fill="#7F5AF0"/>
  <rect x="64" y="36" width="28" height="28" rx="6" fill="#2CB67D"/>
  <rect x="50" y="64" width="28" height="28" rx="6" fill="#FFB85C"/>

  <!-- Real gear overlay in top-right corner -->
  <g transform="translate(88, 40) scale(0.5)">
    <!-- Gear body -->
    <circle cx="0" cy="0" r="16" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="8" fill="#1E1E2F"/>
    
    <!-- Gear teeth (rotated properly around center) -->
    <g fill="#FFFFFF">
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(0)"/>
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(45)"/>
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(90)"/>
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(135)"/>
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(180)"/>
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(225)"/>
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(270)"/>
      <rect x="-2" y="-20" width="4" height="6" transform="rotate(315)"/>
    </g>
  </g>
</svg>